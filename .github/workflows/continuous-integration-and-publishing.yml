name: Continuous Integration & Publishing

on:
  # Trigger the workflow on push or pull request,
  # but only for the main branch
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  release:
    types:
      - published

env:
  # Configures docker-compose to use Docker CLI to build the image:
  COMPOSE_DOCKER_CLI_BUILD: 1
  # Configures Docker CLI to use BuildKit to build the image:
  DOCKER_BUILDKIT: 1
  # The workspace directory used by ci-compose:
  PWD: ${{ github.workspace }}

jobs:
  test_build:
    name: Build Testing Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Test Image
        uses: docker/build-push-action@v7
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: .
          file: Dockerfile
          target: testing
          platforms: linux/amd64
          tags: |
            cal1201/register-aws-ecs-task-definition:testing-${{ github.sha }}
            cal1201/register-aws-ecs-task-definition:testing-latest
          build-args: |
            APP_PATH=${{env.PWD}}
            DEVELOPER_UID=${{env.UID}}
            DEVELOPER_USERNAME=${{env.USER}}
          cache-from: type=gha,scope=testing
          cache-to: type=gha,mode=max,scope=testing

  testing:
    name: Testing
    runs-on: ubuntu-latest
    needs: [test_build]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4

      - name: Load Testing Image
        id: load_test_image
        uses: docker/build-push-action@v7
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: .
          file: ./Dockerfile
          target: testing
          load: true
          platforms: linux/amd64
          tags: |
            cal1201/register-aws-ecs-task-definition:testing-${{ github.sha }}
            cal1201/register-aws-ecs-task-definition:testing-latest
          build-args: |
            APP_PATH=${{env.PWD}}
            DEVELOPER_UID=${{env.UID}}
            DEVELOPER_USERNAME=${{env.USER}}
          cache-from: type=gha,scope=testing

      - name: Run Tests
        run: docker compose -f docker-compose.yml -f ci-compose.yml run --rm tests

  release_build:
    name: Build Release
    runs-on: ubuntu-latest
    needs: [test_build]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Releaseable Image
        id: build_releaseable_image
        uses: docker/build-push-action@v7
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: .
          file: ./Dockerfile
          target: release
          load: true
          platforms: linux/amd64
          tags: |
            cal1201/register-aws-ecs-task-definition:${{ github.sha }}
            cal1201/register-aws-ecs-task-definition:latest
          build-args: |
            APP_PATH=${{env.PWD}}
            DEVELOPER_UID=${{env.UID}}
            DEVELOPER_USERNAME=${{env.USER}}
          cache-from: |
            type=gha,scope=testing
            type=gha,scope=release
          cache-to: type=gha,mode=max,scope=release

      - name: Check if dist is up to date
        run: |
          docker run --rm cal1201/register-aws-ecs-task-definition:latest cat dist/index.js > dist/index.js
          git diff --quiet --exit-code || echo "::error ::dist/index.js is not up to date - perform a build and commit"
          git diff --quiet --exit-code

  publish_package:
    name: Publish Package
    runs-on: ubuntu-latest
    needs: [testing, release_build]
    if: github.event_name == 'release'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4

      - name: Load Releaseable Image
        id: load_releaseable_image
        uses: docker/build-push-action@v7
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: .
          file: ./Dockerfile
          target: release
          load: true
          platforms: linux/amd64
          tags: |
            cal1201/register-aws-ecs-task-definition:${{ github.sha }}
            cal1201/register-aws-ecs-task-definition:latest
          build-args: |
            APP_PATH=${{env.PWD}}
            DEVELOPER_UID=${{env.UID}}
            DEVELOPER_USERNAME=${{env.USER}}
          cache-from: type=gha,scope=release

      - name: Publish Package
        env:
          NPM_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          PACKAGE_VERSION="${VERSION#v}" docker compose -f docker-compose.yml -f ci-compose.yml run --rm publisher
